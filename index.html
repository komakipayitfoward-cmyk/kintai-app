.att-root{
  --bg:#eef1f6; --surface:#ffffff; --ink:#1b2430; --ink-soft:#5b6776;
  --line:#e4e8ef; --line-2:#d4dae3;
  --primary:#284b8c; --primary-2:#1f3c72; --primary-bg:#eaf0fb;
  --present:#1f8a5b; --present-bg:#e7f4ee;
  --absent:#c0341d; --absent-bg:#fbeae7;
  --paid:#2563c9; --paid-bg:#e9f0fc;
  --bereave:#6d5bd0; --bereave-bg:#eeebfa;
  --special:#0e7490; --special-bg:#e4f4f7;
  --ot:#c2410c; --ot-bg:#fbeee4;
  --muted:#7a8694; --muted-bg:#eef1f5;
  --font:"Hiragino Kaku Gothic ProN","Yu Gothic Medium","Yu Gothic","Noto Sans JP",system-ui,-apple-system,sans-serif;
  font-family:var(--font); color:var(--ink); background:var(--bg);
  min-height:100%; line-height:1.5; -webkit-font-smoothing:antialiased;
}
.att-root *{box-sizing:border-box;}
.att-root .num{font-variant-numeric:tabular-nums; font-feature-settings:"tnum";}

.topbar{display:flex; align-items:center; gap:16px; padding:13px 20px; background:var(--surface); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:20;}
.brand{display:flex; align-items:center; gap:11px; min-width:0;}
.brand-mark{width:34px; height:34px; border-radius:9px; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.brand-name{font-weight:700; font-size:16px; letter-spacing:.04em; display:flex; align-items:center; gap:7px;}
.admin-tag{font-size:10.5px; font-weight:700; color:var(--primary); background:var(--primary-bg); padding:1px 7px; border-radius:20px; letter-spacing:.04em;}
.brand-sub{font-size:11px; color:var(--ink-soft); letter-spacing:.02em;}
.month-nav{display:flex; align-items:center; gap:6px; margin:0 auto;}
.month-label{font-size:18px; font-weight:600; min-width:118px; text-align:center;}
.month-label .num{font-weight:700;}
.top-right{display:flex; align-items:center; gap:12px;}
.live-clock{margin:0 auto; display:flex; flex-direction:column; align-items:center; line-height:1.15;}
.lc-time{font-size:24px; font-weight:700; letter-spacing:.02em;}
.lc-sec{font-size:15px; color:var(--ink-soft); font-weight:600;}
.icon-btn{width:34px; height:34px; border:1px solid var(--line-2); background:var(--surface); border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--ink); transition:.15s;}
.icon-btn:hover{background:var(--primary-bg); border-color:var(--primary);}
.save-state{font-size:12px;}
.save-saved{color:var(--present); display:inline-flex; align-items:center; gap:4px;}
.save-saving{color:var(--ink-soft);} .save-dirty{color:var(--ot);}
.save-warn{color:var(--ot); display:inline-flex; align-items:center; gap:4px;}
.admin-link{display:inline-flex; align-items:center; gap:5px; font-family:inherit; font-size:12.5px; font-weight:600; color:var(--ink-soft); background:none; border:1px solid var(--line-2); border-radius:8px; padding:7px 11px; cursor:pointer;}
.admin-link:hover{color:var(--primary); border-color:var(--primary); background:var(--primary-bg);}

.tabs{display:flex; gap:4px; padding:0 16px; background:var(--surface); border-bottom:1px solid var(--line); position:sticky; top:61px; z-index:19; flex-wrap:wrap;}
.tab{display:inline-flex; align-items:center; gap:7px; padding:11px 15px; border:0; background:none; font-family:inherit; font-size:13.5px; font-weight:600; color:var(--ink-soft); cursor:pointer; border-bottom:2.5px solid transparent; transition:.15s;}
.tab:hover{color:var(--ink);} .tab.active{color:var(--primary); border-bottom-color:var(--primary);}

.content{padding:18px 20px 40px; max-width:1200px; margin:0 auto;}
.loading,.empty{padding:38px; text-align:center; color:var(--ink-soft); font-size:13.5px;}

/* kiosk */
.kiosk-bar{padding:12px 16px;}
.kiosk-clock .lc-time{font-size:22px;}
.kiosk-wrap{max-width:480px; margin:0 auto; padding:16px 16px 48px;}
.kiosk-panel.center{display:flex; flex-direction:column; align-items:center; position:relative; padding-top:8px;}
.office-bar{display:flex; align-items:center; justify-content:space-between; gap:10px; background:var(--surface); border:1px solid var(--line-2); border-radius:11px; padding:9px 12px; margin-bottom:16px;}
.office-label{display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:600; color:var(--ink-soft);}
.office-select{font-family:inherit; font-size:14px; font-weight:600; color:var(--primary); background:var(--primary-bg); border:1px solid var(--primary-bg); border-radius:8px; padding:6px 10px;}
.kiosk-title{font-size:14px; color:var(--ink-soft); font-weight:600; margin-bottom:14px; text-align:center;}
.kiosk-back{position:absolute; left:0; top:0; display:inline-flex; align-items:center; gap:5px; font-family:inherit; font-size:13px; font-weight:600; color:var(--ink-soft); background:none; border:0; cursor:pointer;}
.kiosk-back:hover{color:var(--primary);}
.roster{display:grid; grid-template-columns:1fr; gap:11px;}
.person-card{text-align:left; background:var(--surface); border:1px solid var(--line-2); border-left:5px solid var(--muted); border-radius:13px; padding:15px 16px; cursor:pointer; font-family:inherit; transition:.12s;}
.person-card:active{transform:scale(.99);}
.person-card:hover{box-shadow:0 4px 16px rgba(20,30,45,.10);}
.person-card.st-working{border-left-color:var(--present);}
.person-card.st-break{border-left-color:var(--ot);}
.person-card.st-done{border-left-color:var(--paid);}
.person-card.st-leave{border-left-color:var(--bereave);}
.pc-top{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:7px;}
.pc-name{font-size:17px; font-weight:700;}
.pc-status{font-size:11.5px; font-weight:700; padding:2px 10px; border-radius:20px;}
.pc-meta{display:flex; align-items:center; justify-content:space-between; font-size:12.5px; color:var(--ink-soft);}

.pin-name{font-size:21px; font-weight:800; margin-top:26px;}
.pin-sub{font-size:13px; color:var(--ink-soft); margin-top:3px; margin-bottom:6px;}

.confirm-panel{padding-top:60px;}

/* admin shared */
.toolbar{display:flex; align-items:flex-end; gap:14px; margin-bottom:16px; flex-wrap:wrap;}
.toolbar.wrap{align-items:center;}
.filters{display:flex; gap:14px;} .spacer{flex:1;}

.emp-meta{font-size:12.5px; color:var(--ink-soft); display:flex; align-items:center; gap:8px;}
.emp-meta .dot{opacity:.5;}

.btn{display:inline-flex; align-items:center; gap:6px; font-family:inherit; font-size:13px; font-weight:600; padding:8px 13px; border-radius:8px; cursor:pointer; border:1px solid transparent; transition:.15s; white-space:nowrap;}
.btn.primary{background:var(--primary); color:#fff;} .btn.primary:hover{background:var(--primary-2);}

.cards{display:grid; grid-template-columns:repeat(6,1fr); gap:12px; margin-bottom:18px;}

.panel{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:15px; margin-bottom:18px;}

.table-scroll{overflow-x:auto; margin:0 -3px;}

.pin-cell{letter-spacing:.18em; color:var(--ink-soft);}

.summary-table tfoot .sticky-left{background:#f7f9fc;}

.cell-note:hover{border-color:var(--line);}
.cell-note:focus,.cell-select:focus,.cell-time:focus,.cell-num:focus{outline:none; border-color:var(--primary); box-shadow:0 0 0 2px var(--primary-bg);}
.cell-time:disabled,.cell-num:disabled{background:#f4f6f9; color:#aab3bf;}

.entry-table .cell-select,.entry-table .cell-time,.entry-table .cell-num,.entry-table .cell-note{width:100%; min-width:0;}
.entry-table .cell-time{min-width:94px;}
.entry-table .cell-select{min-width:78px;}
.entry-table .cell-num{min-width:48px; text-align:left;}
.entry-table .cell-work{font-family:inherit; font-size:12.5px; border:1px solid var(--line-2); border-radius:6px; padding:4px 6px; width:100%; min-width:56px; text-align:center; background:var(--surface); color:var(--ink); font-variant-numeric:tabular-nums;}
.entry-table .cell-work:focus{outline:none; border-color:var(--primary); box-shadow:0 0 0 2px var(--primary-bg);}
.entry-table .cell-work:disabled{background:#f4f6f9; color:#aab3bf;}
.entry-table .cell-note{min-width:108px;}
.summary-table th.r,.summary-table td.r,.entry-table th.r,.entry-table td.r{text-align:center;}
.flags{display:flex; gap:3px; justify-content:center; flex-wrap:wrap;}
.flag{font-size:10.5px; font-weight:700; padding:1px 5px; border-radius:4px; border:1px solid; line-height:1.5;}
.ledger-hint{font-size:11.5px; color:var(--ink-soft); margin-top:10px;}

.mini-summary{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px;}
.mini-summary>div{background:var(--surface); border:1px solid var(--line); border-radius:9px; padding:8px 14px; display:flex; flex-direction:column; gap:1px; min-width:88px;}
.ms-label{font-size:11px; color:var(--ink-soft); font-weight:600;}
.ms-val{font-size:17px; font-weight:700;}

.dept-list{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px;}
.dept-chip{display:inline-flex; align-items:center; gap:5px; background:var(--primary-bg); color:var(--primary); font-size:12.5px; font-weight:600; padding:5px 6px 5px 12px; border-radius:20px;}
.chip-x{border:0; background:rgba(40,75,140,.12); color:var(--primary); width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;}
.chip-x:hover{background:rgba(40,75,140,.24);}
.dept-add{display:flex; gap:8px;}
.icon-sm{width:28px; height:28px; border:1px solid var(--line-2); background:var(--surface); border-radius:7px; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; color:var(--ink-soft); margin:0 2px; transition:.15s;}
.icon-sm:hover{background:var(--primary-bg); color:var(--primary); border-color:var(--primary);}
.icon-sm.danger:hover{background:var(--absent-bg); color:var(--absent); border-color:#eccfca;}

.modal-backdrop{position:fixed; inset:0; background:rgba(20,30,45,.42); display:flex; align-items:center; justify-content:center; z-index:60; padding:18px;}

.row2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}

.modal-body input,.modal-body select{width:100%; min-width:0;}

.foot{padding:16px 20px 26px; text-align:center; font-size:11.5px; color:var(--ink-soft);}

.setup-title{display:flex; align-items:center; gap:9px; font-size:18px; font-weight:800; margin-bottom:10px;}

.sheet-scroll{width:100%; max-width:760px;}

.ps-summary>div{display:flex; gap:5px; font-size:11px;}
.ps-summary span{color:#555;} .ps-summary b{font-weight:700;}
.ps-sign{display:flex; gap:10px; margin-top:14px; justify-content:flex-end;}
.sign-box{width:84px; height:54px; border:1px solid #9aa0a8; position:relative;}
.sign-box span{position:absolute; top:3px; left:5px; font-size:9px; color:#555;}

@media print {
  @page { size:A4 portrait; margin:10mm; }
  .att-root{background:#fff !important;}
  .att-root > *:not(.print-portal){display:none !important;}
  .print-portal{position:static !important;}
  .print-backdrop{position:static !important; background:none !important; padding:0 !important; overflow:visible !important; display:block !important;}
  .print-controls{display:none !important;}
  .sheet-scroll{max-width:none !important; width:auto !important;}
  .print-sheet{width:auto !important; box-shadow:none !important; border-radius:0 !important; padding:0 !important;}
  .ps-table{font-size:9pt;}
  .ps-table th{font-size:8.5pt;}
}

@media (max-width:880px){
  .cards{grid-template-columns:repeat(3,1fr);}

  .month-nav{order:3; width:100%; margin:4px 0 0;}
  .tabs{top:0; position:static;}
}
@media (max-width:560px){
  .cards{grid-template-columns:repeat(2,1fr);}
  .content{padding:14px 12px 32px;}
}
